<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Parcelas - Cloud</title>
    <style>
        :root { --primary: #4f46e5; --secondary: #10b981; --danger: #ef4444; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Telas */
        #login-screen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        #app-content { display: none; }

        .form-group-login { margin-bottom: 15px; text-align: left; }
        input, button { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; box-sizing: border-box; margin-top: 5px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { filter: brightness(1.1); }
        
        .header-app { display: flex; justify-content: space-between; align-items: center; }
        .card-total { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid var(--danger); box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; }
        .card-total p { font-size: 2rem; font-weight: bold; color: var(--danger); margin: 5px 0; }

        .card-input { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
        
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; border-bottom: 1px solid #f1f5f9; text-align: left; }
        th { background: #f8fafc; }
        
        .progress-bg { background: #e2e8f0; height: 8px; border-radius: 10px; width: 100px; }
        .progress-fill { background: var(--secondary); height: 100%; border-radius: 10px; }
        .btn-pay { background: var(--secondary); width: auto; padding: 5px 10px; }
        .btn-del { background: var(--danger); width: auto; padding: 5px 10px; }
        .btn-logout { background: #64748b; width: auto; }
    </style>
</head>
<body>

<div class="container">
    <!-- TELA DE LOGIN -->
    <div id="login-screen">
        <h2 id="auth-title">Login Cloud</h2>
        <div class="form-group-login">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>
        <div class="form-group-login">
            <label>Senha</label>
            <input type="password" id="password" placeholder="Sua senha">
        </div>
        <button onclick="fazerLogin()">Entrar</button>
        <button style="background: #64748b; margin-top: 10px;" onclick="criarConta()">Criar Nova Conta</button>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app-content">
        <div class="header-app">
            <h1>💰 Meus Gastos Online</h1>
            <button class="btn-logout" onclick="sair()">Sair</button>
        </div>

        <div class="card-total">
            <h2>Dívida Total Restante</h2>
            <p id="totalGeral">R$ 0,00</p>
        </div>

        <div class="card-input">
            <div><label>Descrição</label><input type="text" id="desc"></div>
            <div><label>Valor Total</label><input type="number" id="valor"></div>
            <div><label>Total Parc.</label><input type="number" id="totalP"></div>
            <div><label>Pagas</label><input type="number" id="pagasP"></div>
            <button onclick="salvarNovoGasto()">Adicionar</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Valor Total</th>
                    <th>Parcelas</th>
                    <th>Progresso</th>
                    <th>Falta</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaBody"></tbody>
        </table>
    </div>
</div>

<!-- Scripts do Firebase (Configuração) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ATENÇÃO: COLOQUE SUAS CREDENCIAIS DO FIREBASE AQUI ABAIXO:
    const firebaseConfig = {
        apiKey: "AIzaSyCSwlhenX6HsVSOAnZ7xJCuvQxdGwFaizU",
        authDomain: "controlefinanceiro-c217f.firebaseapp.com",
        projectId: "controlefinanceiro-c217f",
        storageBucket: "controlefinanceiro-c217f.firebasestorage.app",
        messagingSenderId: "544316643829",
        appId: "1:544316643829:web:604676ede2e575e6f928bc"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let usuarioLogado = null;

    // --- FUNÇÕES DE AUTENTICAÇÃO ---
    window.fazerLogin = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro: " + e.message));
    };

    window.criarConta = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        createUserWithEmailAndPassword(auth, email, pass).then(() => alert("Conta criada!")).catch(e => alert(e.message));
    };

    window.sair = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            usuarioLogado = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            ouvirDados();
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    // --- FUNÇÕES DO BANCO DE DADOS (FIRESTORE) ---
    window.salvarNovoGasto = async () => {
        const gasto = {
            userId: usuarioLogado.uid,
            desc: document.getElementById('desc').value,
            valor: parseFloat(document.getElementById('valor').value),
            totalP: parseInt(document.getElementById('totalP').value),
            pagasP: parseInt(document.getElementById('pagasP').value) || 0
        };

        if (gasto.desc && gasto.valor) {
            await addDoc(collection(db, "gastos"), gasto);
            document.getElementById('desc').value = '';
            document.getElementById('valor').value = '';
        }
    };

    function ouvirDados() {
        const q = query(collection(db, "gastos"), where("userId", "==", usuarioLogado.uid));
        onSnapshot(q, (snapshot) => {
            let gastos = [];
            snapshot.forEach(doc => gastos.push({ id: doc.id, ...doc.data() }));
            render(gastos);
        });
    }

    window.pagarParcela = async (id, pagas, total) => {
        if (pagas < total) {
            const docRef = doc(db, "gastos", id);
            await updateDoc(docRef, { pagasP: pagas + 1 });
        }
    };

    window.excluirGasto = async (id) => {
        if (confirm("Excluir item?")) await deleteDoc(doc(db, "gastos", id));
    };

    function render(gastos) {
        const corpo = document.getElementById('tabelaBody');
        corpo.innerHTML = '';
        let totalFaltaGeral = 0;

        gastos.forEach(g => {
            const valorParcela = g.valor / g.totalP;
            const falta = (g.totalP - g.pagasP) * valorParcela;
            const perc = (g.pagasP / g.totalP) * 100;
            totalFaltaGeral += falta;

            corpo.innerHTML += `
                <tr>
                    <td>${g.desc}</td>
                    <td>R$ ${g.valor.toFixed(2)}</td>
                    <td>${g.pagasP}/${g.totalP}</td>
                    <td>
                        <div class="progress-bg"><div class="progress-fill" style="width:${perc}%"></div></div>
                    </td>
                    <td style="color:red; font-weight:bold">R$ ${falta.toFixed(2)}</td>
                    <td>
                        <button class="btn-pay" onclick="pagarParcela('${g.id}', ${g.pagasP}, ${g.totalP})">✔</button>
                        <button class="btn-del" onclick="excluirGasto('${g.id}')">🗑</button>
                    </td>
                </tr>
            `;
        });
        document.getElementById('totalGeral').innerText = `R$ ${totalFaltaGeral.toFixed(2)}`;
    }
</script>

</body>
</html>
