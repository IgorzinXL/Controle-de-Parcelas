<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos Cloud</title>
    <style>
        :root { --primary: #4f46e5; --secondary: #10b981; --danger: #ef4444; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        #login-screen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        #app-content { display: none; }

        input, button { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; box-sizing: border-box; margin-top: 5px; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        
        .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-total { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid var(--danger); box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; }
        .card-total p { font-size: 2.2rem; font-weight: bold; color: var(--danger); margin: 5px 0; }

        .card-input { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
        
        @media (max-width: 768px) { .card-input { grid-template-columns: 1fr; } }

        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 15px; border-bottom: 1px solid #f1f5f9; text-align: left; }
        th { background: #f1f5f9; color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        
        .progress-bg { background: #e2e8f0; height: 8px; border-radius: 10px; width: 100px; position: relative; }
        .progress-fill { background: var(--secondary); height: 100%; border-radius: 10px; transition: 0.5s; }
        
        .btn-pay { background: var(--secondary); width: auto; padding: 6px 12px; }
        .btn-del { background: var(--danger); width: auto; padding: 6px 12px; }
        .btn-logout { background: #64748b; width: auto; padding: 8px 15px; }
    </style>
</head>
<body>

<div class="container">
    <!-- LOGIN -->
    <div id="login-screen">
        <h2>💰 Controle Cloud</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button id="btnLogin">Entrar</button>
        <button id="btnCadastrar" style="background: #64748b; margin-top: 10px;">Criar Conta</button>
    </div>

    <!-- APP -->
    <div id="app-content">
        <div class="header-app">
            <h2 id="userWelcome">Olá!</h2>
            <button class="btn-logout" id="btnLogout">Sair</button>
        </div>

        <div class="card-total">
            <small>DÍVIDA TOTAL RESTANTE</small>
            <p id="totalGeral">R$ 0,00</p>
        </div>

        <div class="card-input">
            <div><label>Descrição</label><input type="text" id="desc"></div>
            <div><label>Valor Total</label><input type="number" id="valor"></div>
            <div><label>Parcelas</label><input type="number" id="totalP"></div>
            <div><label>Pagas</label><input type="number" id="pagasP" value="0"></div>
            <button id="btnSalvar">Adicionar</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Total</th>
                    <th>Parcelas</th>
                    <th>Progresso</th>
                    <th>Falta</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- CONFIGURAÇÃO DO FIREBASE (COLE A SUA AQUI) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCSwlhenX6HsVSOAnZ7xJCuvQxdGwFaizU",
        authDomain: "controlefinanceiro-c217f.firebaseapp.com",
        projectId: "controlefinanceiro-c217f ",
        storageBucket: "controlefinanceiro-c217f.firebasestorage.app",
        messagingSenderId: " 544316643829",
        appId: "1:544316643829:web:604676ede2e575e6f928bc"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userUID = null;

    // --- AUTENTICAÇÃO ---
    document.getElementById('btnLogin').addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro ao entrar: " + e.message));
    });

    document.getElementById('btnCadastrar').addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        createUserWithEmailAndPassword(auth, email, pass).then(() => alert("Conta criada!")).catch(e => alert(e.message));
    });

    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            userUID = user.uid;
            document.getElementById('userWelcome').innerText = `Olá, ${user.email}`;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            carregarDados();
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    // --- BANCO DE DADOS ---
    document.getElementById('btnSalvar').addEventListener('click', async () => {
        const desc = document.getElementById('desc').value;
        const valor = parseFloat(document.getElementById('valor').value);
        const totalP = parseInt(document.getElementById('totalP').value);
        const pagasP = parseInt(document.getElementById('pagasP').value) || 0;

        if (desc && !isNaN(valor)) {
            try {
                await addDoc(collection(db, "gastos"), {
                    uid: userUID,
                    desc,
                    valor,
                    totalP,
                    pagasP,
                    dataCriacao: new Date()
                });
                document.getElementById('desc').value = '';
                document.getElementById('valor').value = '';
                document.getElementById('totalP').value = '';
            } catch (e) { alert("Erro ao salvar: " + e.message); }
        } else {
            alert("Preencha a descrição e o valor!");
        }
    });

    function carregarDados() {
        const q = query(collection(db, "gastos"), where("uid", "==", userUID));
        
        // O onSnapshot mantém a página atualizada em tempo real
        onSnapshot(q, (snapshot) => {
            const tabela = document.getElementById('tabelaBody');
            tabela.innerHTML = '';
            let totalDevedor = 0;

            snapshot.forEach((doc) => {
                const item = doc.data();
                const id = doc.id;
                
                const valorParcela = item.valor / item.totalP;
                const parcelasRestantes = item.totalP - item.pagasP;
                const faltaPagar = parcelasRestantes * valorParcela;
                const perc = (item.pagasP / item.totalP) * 100;
                
                totalDevedor += faltaPagar;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${item.desc}</strong></td>
                    <td>R$ ${item.valor.toFixed(2)}</td>
                    <td>${item.pagasP}/${item.totalP}</td>
                    <td>
                        <div class="progress-bg"><div class="progress-fill" style="width:${perc}%"></div></div>
                        <small>${perc.toFixed(0)}%</small>
                    </td>
                    <td style="color:var(--danger); font-weight:bold">R$ ${faltaPagar.toFixed(2)}</td>
                    <td>
                        <button class="btn-pay" id="pay-${id}">✔</button>
                        <button class="btn-del" id="del-${id}">🗑</button>
                    </td>
                `;
                tabela.appendChild(tr);

                // Eventos dos botões da tabela
                document.getElementById(`pay-${id}`).onclick = () => pagarParcela(id, item.pagasP, item.totalP);
                document.getElementById(`del-${id}`).onclick = () => excluirItem(id);
            });

            document.getElementById('totalGeral').innerText = `R$ ${totalDevedor.toFixed(2)}`;
        });
    }

    async function pagarParcela(id, pagasP, totalP) {
        if (pagasP < totalP) {
            await updateDoc(doc(db, "gastos", id), { pagasP: pagasP + 1 });
        }
    }

    async function excluirItem(id) {
        if (confirm("Deseja remover este gasto?")) {
            await deleteDoc(doc(db, "gastos", id));
        }
    }
</script>

</body>
</html>
